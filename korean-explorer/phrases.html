<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Phrase Explorer 💬 | Korean Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <span class="logo-icon">🇰🇷</span>
    <span class="logo-text">Korean Explorer</span>
  </a>
  <nav>
    <a href="hangul.html">🔤 Hangul</a>
    <a href="words.html">🐱 Words</a>
    <a href="numbers.html">🔢 Numbers</a>
    <a href="phrases.html">💬 Phrases</a>
    <a href="games.html">🎮 Games</a>
  </nav>
</header>

<main>
  <div class="progress-widget">
    <div class="level-badge" id="level-display">Level 1</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar-fill" style="width:0%"></div>
    </div>
    <div class="points-display" id="points-display">⭐ 0 pts</div>
    <div class="stars-display" id="stars-display"></div>
  </div>

  <div class="page-title">
    <div class="page-emoji">💬</div>
    <h1>Phrase Explorer</h1>
    <p>Say hello and more in Korean! 🎙️</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showPhraseTab('learn', this)">📖 Learn</button>
    <button class="tab-btn" onclick="showPhraseTab('match', this)">🎯 Match</button>
  </div>

  <!-- ── LEARN TAB ── -->
  <div id="tab-learn" class="tab-content">
    <div id="phrase-list" style="display:flex; flex-direction:column; gap:12px; margin-top:8px"></div>
  </div>

  <!-- ── MATCH TAB ── -->
  <div id="tab-match" class="tab-content" style="display:none">
    <div class="card" style="padding:24px">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:16px">
        <h2 style="color:var(--purple)">🎯 Match the Phrases!</h2>
        <div>Score: <strong id="pmatch-score">0</strong> / <strong id="pmatch-total">0</strong></div>
      </div>
      <p style="color:#888; margin-bottom:12px">Match the Korean phrase to its English meaning!</p>
      <button class="btn btn-orange" onclick="startPhraseMatch()" style="margin-bottom:16px">🔄 New Game</button>
      <div class="match-area">
        <div class="match-col" id="pmatch-korean"></div>
        <div style="display:flex; align-items:center; font-size:2rem; color:#ccc">↔</div>
        <div class="match-col" id="pmatch-english"></div>
      </div>
    </div>
  </div>
</main>

<div id="ad-banner"></div>
<div id="toast"></div>

<footer>
  <p><a href="mailto:nomadongho@gmail.com?subject=Korean Explorer Feedback">✉️ Send feedback to developer</a></p>
</footer>

<script src="js/audio.js"></script>
<script src="js/progress.js"></script>
<script src="js/app.js"></script>
<script src="../shared/ad-manager.js"></script>
<script src="js/ad-config.js"></script>
<script src="js/ads.js"></script>
<script>
const phrases = [
  { emoji:'👋', korean:'안녕하세요',        roman:'An-nyeong-ha-se-yo',    english:'Hello' },
  { emoji:'🙏', korean:'감사합니다',         roman:'Gam-sa-ham-ni-da',     english:'Thank you' },
  { emoji:'👋', korean:'안녕',              roman:'An-nyeong',            english:'Bye / Hi (casual)' },
  { emoji:'✅', korean:'네',               roman:'Ne',                   english:'Yes' },
  { emoji:'❌', korean:'아니요',            roman:'A-ni-yo',              english:'No' },
  { emoji:'😊', korean:'괜찮아요',          roman:'Gwaen-chan-a-yo',      english:'I\'m okay / It\'s okay' },
  { emoji:'🙂', korean:'제 이름은 ___ 이에요', roman:'Je i-reum-eun ___ i-e-yo', english:'My name is ___' },
  { emoji:'🎂', korean:'저는 다섯 살이에요',  roman:'Jeo-neun da-seot sal-i-e-yo', english:'I am 5 years old' },
  { emoji:'❓', korean:'이게 뭐예요?',       roman:'I-ge mwo-ye-yo?',     english:'What is this?' },
  { emoji:'🍽️', korean:'맛있어요',           roman:'Ma-si-sseo-yo',       english:'It\'s delicious!' },
  { emoji:'😢', korean:'미안해요',           roman:'Mi-an-hae-yo',        english:'I\'m sorry' },
  { emoji:'🤝', korean:'잘 부탁해요',        roman:'Jal bu-tak-hae-yo',   english:'Nice to meet you' },
  { emoji:'🌙', korean:'안녕히 주무세요',    roman:'An-nyeong-hi ju-mu-se-yo', english:'Good night' },
  { emoji:'☀️', korean:'안녕히 계세요',      roman:'An-nyeong-hi gye-se-yo',  english:'Goodbye (to one staying)' },
  { emoji:'❤️', korean:'사랑해요',           roman:'Sa-rang-hae-yo',      english:'I love you' },
];

let pmatchSelected  = null;
let pmatchScore     = 0;
let pmatchTotal     = 0;

// ── Tab switching ──────────────────────────────
function showPhraseTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
  document.querySelectorAll('.tabs .tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).style.display = '';
  btn.classList.add('active');
  if (tab === 'match') startPhraseMatch();
}

// ── Learn tab ─────────────────────────────────
function renderPhraseList() {
  const list = document.getElementById('phrase-list');
  list.innerHTML = '';
  phrases.forEach(p => {
    const card = document.createElement('div');
    card.className = 'phrase-card';
    card.innerHTML = `
      <div class="phrase-emoji">${p.emoji}</div>
      <div style="flex:1">
        <div class="phrase-korean">${p.korean}</div>
        <div class="phrase-roman">${p.roman}</div>
        <div class="phrase-english">${p.english}</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:8px">
        <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); playPhrase('${p.korean.replace(/'/g, "\\'")}')">🔊 Hear</button>
        <button class="btn btn-accent btn-sm" onclick="event.stopPropagation(); repeatPhrase('${p.korean.replace(/'/g, "\\'")}', '${p.roman.replace(/'/g, "\\'")}')">🗣️ Repeat</button>
      </div>
    `;
    card.onclick = () => {
      playPhrase(p.korean);
      const result = ProgressManager.addPoints(5);
      if (result.leveledUp) { launchConfetti(); showToast('Level Up! 🎉', 'star', 3000); }
    };
    list.appendChild(card);
  });
}

function playPhrase(korean) {
  AudioManager.speakKorean(korean, 0.75);
}

function repeatPhrase(korean, roman) {
  AudioManager.speakEnglish('Say: ' + roman);
  setTimeout(() => AudioManager.speakKorean(korean, 0.7), 2000);
  showToast('🗣️ Repeat after me!', 'info');
}

// ── Match game ─────────────────────────────────
function startPhraseMatch() {
  pmatchScore    = 0;
  pmatchTotal    = 0;
  pmatchSelected = null;
  document.getElementById('pmatch-score').textContent = 0;

  const items = pickRandom(phrases, 5);
  pmatchTotal = items.length;
  document.getElementById('pmatch-total').textContent = pmatchTotal;

  const koreanSide  = shuffle([...items]);
  const englishSide = shuffle([...items]);

  const kCol = document.getElementById('pmatch-korean');
  const eCol = document.getElementById('pmatch-english');
  kCol.innerHTML = '';
  eCol.innerHTML = '';

  koreanSide.forEach(p => {
    const el = document.createElement('div');
    el.className = 'match-item';
    el.textContent = p.korean;
    el.dataset.key  = p.korean;
    el.dataset.side = 'korean';
    el.onclick = () => handlePhraseMatch(el);
    kCol.appendChild(el);
  });

  englishSide.forEach(p => {
    const el = document.createElement('div');
    el.className = 'match-item';
    el.textContent = p.english;
    el.dataset.key  = p.korean;
    el.dataset.side = 'english';
    el.onclick = () => handlePhraseMatch(el);
    eCol.appendChild(el);
  });
}

function handlePhraseMatch(el) {
  if (el.classList.contains('matched')) return;

  if (!pmatchSelected) {
    pmatchSelected = el;
    el.classList.add('selected');
    if (el.dataset.side === 'korean') AudioManager.speakKorean(el.dataset.key, 0.75);
    return;
  }

  if (pmatchSelected === el) {
    el.classList.remove('selected');
    pmatchSelected = null;
    return;
  }

  if (pmatchSelected.dataset.side === el.dataset.side) {
    pmatchSelected.classList.remove('selected');
    pmatchSelected = el;
    el.classList.add('selected');
    if (el.dataset.side === 'korean') AudioManager.speakKorean(el.dataset.key, 0.75);
    return;
  }

  if (pmatchSelected.dataset.key === el.dataset.key) {
    pmatchSelected.classList.remove('selected');
    pmatchSelected.classList.add('matched');
    el.classList.add('matched');
    pmatchScore++;
    document.getElementById('pmatch-score').textContent = pmatchScore;
    AudioManager.speakKorean(el.dataset.key, 0.75);
    showToast('Correct! 🎉 +10 pts', 'correct');
    const result = ProgressManager.addPoints(10);
    if (result.leveledUp) { launchConfetti(); showToast('Level Up! 🎉', 'star', 3000); }

    if (pmatchScore === pmatchTotal) {
      setTimeout(() => {
        showToast('All matched! Awesome! ⭐', 'star', 3000);
        launchConfetti();
        ProgressManager.addStar();
      }, 600);
    }
  } else {
    pmatchSelected.classList.remove('selected');
    pmatchSelected.classList.add('wrong');
    el.classList.add('wrong');
    showToast('Try again! 🙂', 'wrong');
    AudioManager.speakEnglish('Try again');
    setTimeout(() => {
      pmatchSelected.classList.remove('wrong');
      el.classList.remove('wrong');
    }, 800);
  }
  pmatchSelected = null;
}

document.addEventListener('DOMContentLoaded', renderPhraseList);
</script>
</body>
</html>
