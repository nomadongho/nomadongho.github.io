<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Word Explorer 🐱 | Korean Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <span class="logo-icon">🇰🇷</span>
    <span class="logo-text">Korean Explorer</span>
  </a>
  <nav>
    <a href="hangul.html">🔤 Hangul</a>
    <a href="words.html">🐱 Words</a>
    <a href="numbers.html">🔢 Numbers</a>
    <a href="phrases.html">💬 Phrases</a>
    <a href="games.html">🎮 Games</a>
  </nav>
</header>

<main>
  <div class="progress-widget">
    <div class="level-badge" id="level-display">Level 1</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar-fill" style="width:0%"></div>
    </div>
    <div class="points-display" id="points-display">⭐ 0 pts</div>
    <div class="stars-display" id="stars-display"></div>
  </div>

  <div class="page-title">
    <div class="page-emoji">🐱</div>
    <h1>Word Explorer</h1>
    <p>Tap a word card to hear it! 🔊</p>
  </div>

  <!-- Category tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showCategory('animals', this)">🐾 Animals</button>
    <button class="tab-btn" onclick="showCategory('food', this)">🍎 Food</button>
    <button class="tab-btn" onclick="showCategory('colors', this)">🎨 Colors</button>
    <button class="tab-btn" onclick="showCategory('numbers', this)">🔢 Numbers</button>
    <button class="tab-btn" onclick="showCategory('family', this)">👨‍👩‍👧 Family</button>
    <button class="tab-btn" onclick="showCategory('body', this)">👀 Body</button>
  </div>

  <div id="word-grid-container" class="word-grid"></div>

  <!-- Word detail modal -->
  <div id="word-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; display:none; align-items:center; justify-content:center;">
    <div class="card" style="max-width:340px; width:90%; text-align:center; padding:32px; position:relative;">
      <button onclick="closeModal()" style="position:absolute; top:12px; right:16px; background:none; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
      <div id="modal-emoji" style="font-size:5rem; margin-bottom:10px"></div>
      <div id="modal-korean" style="font-size:2.5rem; color:var(--primary); font-weight:bold; margin-bottom:4px"></div>
      <div id="modal-english" style="font-size:1.2rem; color:#888; margin-bottom:20px"></div>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap">
        <button class="btn btn-primary" onclick="playModalWord()">🔊 Hear it!</button>
        <button class="btn btn-accent" onclick="repeatModal()">🗣️ Repeat After Me!</button>
      </div>
    </div>
  </div>
</main>

<div id="ad-banner"></div>
<div id="toast"></div>

<footer>
  <p><a href="mailto:nomadongho@gmail.com?subject=Korean Explorer Feedback">✉️ Send feedback to developer</a></p>
</footer>

<script src="js/audio.js"></script>
<script src="js/progress.js"></script>
<script src="js/app.js"></script>
<script src="../shared/ad-manager.js"></script>
<script src="js/ad-config.js"></script>
<script src="js/ads.js"></script>
<script>

    { emoji:'❤️', korean:'심장', english:'Heart' },
  ],

let modalWord = null;

function showCategory(cat, btn) {
  document.querySelectorAll('.tabs .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const grid = document.getElementById('word-grid-container');
  grid.innerHTML = '';
  const words = wordData[cat];

  words.forEach(w => {
    const card = document.createElement('div');
    card.className = 'word-card';
    card.innerHTML = `
      <div class="word-emoji">${w.emoji}</div>
      <div class="word-korean">${w.korean}</div>
      <div class="word-english">${w.english}</div>
    `;
    card.onclick = () => openModal(w);
    grid.appendChild(card);
  });
}

function openModal(w) {
  modalWord = w;
  document.getElementById('modal-emoji').textContent   = w.emoji;
  document.getElementById('modal-korean').textContent  = w.korean;
  document.getElementById('modal-english').textContent = w.english;

  const modal = document.getElementById('word-modal');
  modal.style.display = 'flex';
  AudioManager.speakKorean(w.korean);

  const result = ProgressManager.addPoints(5);
  if (result.leveledUp) { launchConfetti(); showToast('Level Up! 🎉', 'star', 3000); }
}

function closeModal() {
  document.getElementById('word-modal').style.display = 'none';
}

function playModalWord() {
  if (modalWord) AudioManager.speakKorean(modalWord.korean);
}

function repeatModal() {
  if (!modalWord) return;
  AudioManager.speakEnglish('Say: ' + modalWord.english);
  setTimeout(() => AudioManager.speakKorean(modalWord.korean), 1800);
  showToast('🗣️ Say it out loud!', 'info');
}

// Close modal on backdrop click
document.getElementById('word-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Load default category
document.addEventListener('DOMContentLoaded', () => {
  showCategory('animals', document.querySelector('.tabs .tab-btn'));
});
</script>
</body>
</html>
